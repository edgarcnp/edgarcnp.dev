name: CI

on:
    push:
        branches: [main]
    pull_request:
        branches: [main]
    workflow_dispatch:

jobs:
    code-quality:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v7

            - name: Install pnpm
              uses: pnpm/action-setup@v6
              with:
                  version: 11

            - name: Install Node
              uses: actions/setup-node@v6
              with:
                  node-version: 24
                  cache: pnpm

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Type check
              run: pnpm tsc --noEmit

            - name: Lint
              run: pnpm lint

    build:
        runs-on: ubuntu-latest
        needs: code-quality
        steps:
            - name: Checkout
              uses: actions/checkout@v7

            - name: Install pnpm
              uses: pnpm/action-setup@v6
              with:
                  version: 11

            - name: Install Node
              uses: actions/setup-node@v6
              with:
                  node-version: 24
                  cache: pnpm

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Build
              run: pnpm build
