name: Renovate

on:
    schedule:
        - cron: "0 0 * * *"
    workflow_dispatch:

jobs:
    renovate:
        runs-on: codeberg-medium
        container:
            image: ghcr.io/renovatebot/renovate:latest
        steps:
            - name: Checkout
              uses: actions/checkout@v4
              with:
                  fetch-depth: 0
            - name: Renovate
              uses: renovatebot/github-action@v40
              with:
                  token: ${{ secrets.RENOVATE_TOKEN }}
